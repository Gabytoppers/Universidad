<!DOCTYPE html>
<html lang="es">
    <hedad>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=2.0">
        <title>Formulario</title>   
    </hedad>

    <body>
        <h1> Registro para vacunacion COVID-19 </h1>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre-form" name="nombre-form" required>
        <br>

        <label for="apellidos">Apellidos:</label>
        <input type="text" id="apellidos-form" name="apellidos-form" required>
        <br>

        <label for="fechaNacimiento">Fecha de nacimiento:</label>
        <input type="text" id="fechaNacimiento-form" name="fechaNacimiento-form" required>
        <br>

        <label for="telefono">Telefono:</label>
        <input type="text" id="telefono-form" name="telefono-form" required>
        <br>

        <div class="form-check">
            <input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios1" value="option1" checked>
            <label class="form-check-label" for="exampleRadios1">
              Hombre
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios2" value="option2">
            <label class="form-check-label" for="exampleRadios2">
              Mujer
            </label>
          </div>
          <br>
         

        <label for="email">Email:</label>
        <input type="email" id="email-form" name="email-form" required>
        <br>

        <label for="contraseña">Contraseña:</label>
        <input type="contraseña" id="contraseña-form" name="congtraseña-form" required>
        <br>

        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
            <label class="form-check-label" for="inlineCheckbox1">Declaro haber leido y acepto las condiciones generales del programa y la normativa sobre protección de datos</label>
          </div>
          <br>

          <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Example textarea</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
          </div>
          <br>

          <input type="submit" id="email-form" name="email-form" required>
          

        
    </body>
</html>
